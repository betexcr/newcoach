name: Deploy Web to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Validate required secrets
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ]; then
            echo "::error::EXPO_PUBLIC_SUPABASE_URL secret is not set"
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "::error::EXPO_PUBLIC_SUPABASE_ANON_KEY secret is not set"
            exit 1
          fi
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Build Expo web
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Inject HTML meta tags
        run: |
          node -e "
          const fs = require('fs');
          let html = fs.readFileSync('dist/index.html', 'utf8');

          html = html.replace('<html lang=\"en\">', '<html lang=\"es\">');
          html = html.replace('<title>NewCoach</title>', '<title>NewCoach — App de Coaching Fitness</title>');

          const meta = [
            '<meta name=\"description\" content=\"Entrenamientos, nutrición, hábitos y mensajería coach-cliente. iOS, Android y Web.\" />',
            '<meta property=\"og:type\" content=\"website\" />',
            '<meta property=\"og:url\" content=\"https://newcoach.vercel.app\" />',
            '<meta property=\"og:title\" content=\"NewCoach — App de Coaching Fitness\" />',
            '<meta property=\"og:description\" content=\"Entrenamientos, nutrición, hábitos y mensajería coach-cliente. iOS, Android y Web.\" />',
            '<meta property=\"og:image\" content=\"https://newcoach.vercel.app/og-image.png\" />',
            '<meta property=\"og:image:width\" content=\"1376\" />',
            '<meta property=\"og:image:height\" content=\"768\" />',
            '<meta property=\"og:locale\" content=\"es_MX\" />',
            '<meta name=\"twitter:card\" content=\"summary_large_image\" />',
            '<meta name=\"twitter:title\" content=\"NewCoach — App de Coaching Fitness\" />',
            '<meta name=\"twitter:description\" content=\"Entrenamientos, nutrición, hábitos y mensajería coach-cliente. iOS, Android y Web.\" />',
            '<meta name=\"twitter:image\" content=\"https://newcoach.vercel.app/og-image.png\" />',
          ].join('\n    ');

          html = html.replace('</head>', '    ' + meta + '\n  </head>');
          fs.writeFileSync('dist/index.html', html);
          console.log('Injected OG meta tags into dist/index.html');
          "

      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output
          cp -r dist .vercel/output/static
          cat > .vercel/output/config.json << 'VCFG'
          {
            "version": 3,
            "routes": [
              { "src": "/assets/(.*)", "headers": { "Cache-Control": "public, max-age=31536000, immutable" }, "continue": true },
              { "src": "/(.*)", "headers": { "X-Content-Type-Options": "nosniff", "X-Frame-Options": "DENY", "X-XSS-Protection": "1; mode=block" }, "continue": true },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          VCFG

      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

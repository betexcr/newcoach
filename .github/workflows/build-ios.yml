name: Build iOS & Submit to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build iOS & Submit to TestFlight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Decode App Store Connect API Key
        run: |
          echo "${{ secrets.APPLE_ASC_API_KEY_BASE64 }}" | base64 --decode > ./ascApiKey.p8

      - name: Build iOS on EAS
        run: eas build --platform ios --profile production --non-interactive
        env:
          EXPO_ASC_API_KEY_ID: ${{ secrets.APPLE_ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: ./ascApiKey.p8

      - name: Submit to TestFlight
        run: eas submit --platform ios --latest --non-interactive
        env:
          EXPO_ASC_API_KEY_ID: ${{ secrets.APPLE_ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          EXPO_ASC_API_KEY_PATH: ./ascApiKey.p8

      - name: Cleanup API key
        if: always()
        run: rm -f ./ascApiKey.p8
